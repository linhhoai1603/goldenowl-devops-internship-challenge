name: CI

on:
  push:
    branches:
      - feature
      - 'feature/**'
  pull_request:
    branches:
      - feature
      - 'feature/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Write .env from ENV_CONTENT
        env:
          ENV_CONTENT: ${{ secrets.ENV_CONTENT }}
        run: printf '%s\n' "$ENV_CONTENT" > .env

      - name: Run tests
        run: npm test
