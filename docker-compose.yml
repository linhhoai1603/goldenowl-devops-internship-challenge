services:
  app1:
    image: ${DOCKER_IMAGE:?DOCKER_IMAGE is required}
    container_name: goldenowl-app-1
    env_file:
      - .env
    environment:
      PORT: 80
    expose:
      - '80'
    restart: unless-stopped
    networks:
      - goldenowl-net

  app2:
    image: ${DOCKER_IMAGE:?DOCKER_IMAGE is required}
    container_name: goldenowl-app-2
    env_file:
      - .env
    environment:
      PORT: 80
    expose:
      - '80'
    restart: unless-stopped
    networks:
      - goldenowl-net

  nginx:
    image: nginx:1.27-alpine
    container_name: goldenowl-nginx
    ports:
      - '${NGINX_HTTP_PORT:-8080}:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app1
      - app2
    restart: unless-stopped
    networks:
      - goldenowl-net

networks:
  goldenowl-net:
    driver: bridge
