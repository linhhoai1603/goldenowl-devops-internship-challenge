upstream goldenowl_backend {
    server app1:80;
    server app2:80;
}

# HTTP — chỉ redirect sang HTTPS (không phục vụ nội dung plain HTTP)
server {
    listen 80 default_server;
    server_name shuttlex.io.vn www.shuttlex.io.vn;

    return 301 https://$host$request_uri;
}

# HTTPS — traffic thật + proxy tới app
server {
    listen 443 ssl;
    server_name shuttlex.io.vn www.shuttlex.io.vn;

    ssl_certificate     /etc/nginx/certs/cloudflare.crt;
    ssl_certificate_key /etc/nginx/certs/cloudflare.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://goldenowl_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
