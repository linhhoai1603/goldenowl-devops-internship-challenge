upstream goldenowl_backend {
    server app1:80;
    server app2:80;
}

# HTTP — Cloudflare Flexible gọi origin qua port 80 (proxy, không redirect tránh loop)
server {
    listen 80;
    server_name shuttlex.io.vn www.shuttlex.io.vn;

    location / {
        proxy_pass http://goldenowl_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS — dùng khi Cloudflare SSL mode Full / Full (strict), origin cert trong ./nginx/certs/
server {
    listen 443 ssl;
    server_name shuttlex.io.vn www.shuttlex.io.vn;

    ssl_certificate     /etc/nginx/certs/cloudflare.crt;
    ssl_certificate_key /etc/nginx/certs/cloudflare.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://goldenowl_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
